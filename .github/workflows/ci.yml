# ─────────────────────────────────────────────────────────────────────────────
# Orchestra — standard PRODUCT CI gate (lead-triage-demo)
#
# Six hard, build-failing jobs:
#   lint             — Biome formatter + linter, zero findings (SA-1)
#   typecheck        — types are part of the contract
#   test             — the project's test suite (red-gate TDD)
#   dependency-audit — no HIGH/CRITICAL vuln in shipped (production) deps
#   secret-scan      — gitleaks; no secret ever lands (SEC-09)
#   gate-evidence    — security/UI change can't merge without its docs/gates/ evidence (ADR-0011)
#
# Node project lives in service/ — npm steps use working-directory: service.
# The gate-evidence job runs at the REPO ROOT (tools/gate/ + docs/gates/ live there).
# ─────────────────────────────────────────────────────────────────────────────
name: ci

# Least privilege — these jobs only read the checked-out tree.
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # SA-1 — style is automated, not argued. Formatter + linter, zero findings.
  lint:
    name: lint + format (SA-1)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 24: the sidecar uses node:sqlite (built-in, available 22.5+;
          # unflagged on Node 24). Node 20 lacks it → ERR_UNKNOWN_BUILTIN_MODULE.
          node-version: '24'
      - run: npm ci
      # Biome = formatter + linter in one. `biome ci` is check-only (never writes).
      - run: npx @biomejs/biome ci .

  # Types are part of the contract — a green typecheck is non-negotiable.
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 24: the sidecar uses node:sqlite (built-in, available 22.5+;
          # unflagged on Node 24). Node 20 lacks it → ERR_UNKNOWN_BUILTIN_MODULE.
          node-version: '24'
      - run: npm ci
      - run: npm run typecheck

  # Red-gate TDD — the suite must pass before anything ships.
  test:
    name: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 24: the sidecar uses node:sqlite (built-in, available 22.5+;
          # unflagged on Node 24). Node 20 lacks it → ERR_UNKNOWN_BUILTIN_MODULE.
          node-version: '24'
      - run: npm ci
      - run: npm test

  # Dependency vulnerabilities (supply chain). Gate: fail on HIGH/CRITICAL in
  # SHIPPED (production) deps. Full audit printed for visibility but never blocks.
  dependency-audit:
    name: dependency audit (prod deps, high+)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - name: Full audit (informational — never blocks)
        run: npm audit || true
      - name: Gate — no HIGH/CRITICAL in production deps
        run: npm audit --omit=dev --audit-level=high

  # SEC-09 — non-bypassable secret scan. Detection rules + allowlist: .gitleaks.toml
  secret-scan:
    name: gitleaks — secret scan (SEC-09)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks (pinned + SHA256-verified)
        run: |
          GITLEAKS_VERSION="8.30.1"
          GITLEAKS_SHA256="551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz -C /usr/local/bin gitleaks
          rm gitleaks.tar.gz
          gitleaks version
      - name: Run gitleaks
        run: gitleaks detect --no-banner --redact -c .gitleaks.toml

  # ADR-0011 / GATE-EVIDENCE.md — the gate you can't skip. Runs a VENDORED copy of the
  # company's tools/evals/check_security_enumeration.py (keep byte-identical; the company's
  # check_product_ci.py flags drift). Runs at the REPO ROOT (no working-directory: service).
  # A security-sensitive diff must commit docs/gates/<slug>-security-review.md; a UI/behavioral
  # diff must commit docs/gates/<slug>-qa-gate.md — in the SAME PR, else this job hard-fails.
  gate-evidence:
    name: gate — required evidence (ADR-0011)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Required gate evidence (SR-6 / VR-4)
        env:
          EVENT: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.sha }}
        run: |
          if [ "$EVENT" = "pull_request" ]; then
            BASE="$PR_BASE"; HEAD="$PR_HEAD"
          else
            BASE="$PUSH_BEFORE"; HEAD="$PUSH_AFTER"
          fi
          python3 tools/gate/check_security_enumeration.py --base "$BASE" --head "$HEAD"
